# Deploy Frq to GitHub Pages
# Pure static site (HTML/CSS/JS) — no build step. On every push to main we
# publish the repo root to the gh-pages branch, excluding source-only files.
name: Deploy Frq to GitHub Pages

on:
  push:
    branches: [main]
  # allow manual runs from the Actions tab
  workflow_dispatch:

# least-privilege: the action only needs to write the gh-pages branch
permissions:
  contents: write

# avoid overlapping deploys racing each other
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          # don't ship project/source files to the live site
          exclude_assets: 'CLAUDE.md,.github,README.md,assets/og-image.svg'
